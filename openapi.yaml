openapi: 3.0.0
info:
  title: zMind Generator API
  description: 这是一个专门为 Coze 打造的思维导图生成器插件，可以将 Markdown 格式的节点文本转化为精美的可视化 PNG 图片。
  version: 1.0.0
servers:
  - url: https://dmindmap.zeabur.app
paths:
  /generate:
    post:
      summary: 生成思维导图
      operationId: generateMindmap
      description: 传入 Markdown 文本，返回 JSON：默认含 JPEG（或 PNG）的 Data URI（image_base64），便于工作流直接接文件；同时返回图片 URL 等字段。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - markdown_text
              properties:
                markdown_text:
                  type: string
                  description: |
                    思维导图层级 Markdown（# 标题、## 子节点…）。
                    若上游误传 JSON 字符串（如 {"image":"# 根\n## 子…"}），服务端会尝试解析并取 image / markdown 等字段内的正文再渲染。
                jump_link:
                  type: string
                  description: 可选。在线编辑页完整 URL；不传则使用服务端环境变量 MINDMAP_JUMP_LINK；均未配置时 data 中不含「编辑」链接。
                image_format:
                  type: string
                  enum:
                    - jpeg
                    - jpg
                    - jepg
                    - png
                  default: jpeg
                  description: 输出图片格式；默认 jpeg。工作流要 JPEG 文件时保持默认即可。
                include_image_base64:
                  type: boolean
                  default: true
                  description: |
                    为 true（默认）时，响应中 image_base64 为 data:image/jpeg;base64,... 或 PNG 的 Data URI，便于 Coze 工作流「文件 / 图片」节点直接使用。
                    为 false 时 image_base64 为空字符串，仅使用 data_struct.pic 等 URL，以减小响应体。
      responses:
        '200':
          description: 生成成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - data
                  - data_struct
                  - log_id
                  - msg
                  - status_code
                  - type_for_model
                properties:
                  code:
                    type: integer
                    description: 业务码，成功为 0
                    example: 0
                  data:
                    type: string
                    description: Markdown 字符串（含图片与说明），可直接展示
                  data_struct:
                    type: object
                    required:
                      - jump_link
                      - pic
                    properties:
                      jump_link:
                        type: string
                        description: 编辑/跳转链接；未配置时为空字符串
                      pic:
                        type: string
                        description: 思维导图图片 URL，默认 JPEG，也可通过 image_format 生成 PNG。
                  log_id:
                    type: string
                    description: 请求追踪 ID
                  msg:
                    type: string
                    example: success
                  status_code:
                    type: integer
                    description: 状态码，成功为 0
                    example: 0
                  type_for_model:
                    type: integer
                    description: 模型侧类型标识
                    example: 2
                  image_url:
                    type: string
                    description: 与 data_struct.pic 相同；若 Coze 仍绑定旧字段名 image_url，请映射此项。
                  message:
                    type: string
                    description: 与 msg 相同；若工具输出仍绑定 message，请映射此项。
                  image_base64:
                    type: string
                    description: |
                      默认（请求中 include_image_base64 为 true）为完整 Data URI，如 data:image/jpeg;base64,...，与工作流图片文件输入兼容。
                      include_image_base64 为 false 时为空字符串。
